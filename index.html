<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PIP-BOY 3000 - Survival Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Share+Tech+Mono&display=swap"
    />
    <style>
      /* ── Pre-hydration splash: shows immediately, hidden by React on mount ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: oklch(0.13 0.04 320);
        color: oklch(0.97 0.02 320);
        font-family: 'JetBrains Mono', monospace;
        transition: opacity 0.4s ease-out;
      }

      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }

      /* Outer ring */
      #splash-spinner {
        position: relative;
        width: 56px;
        height: 56px;
        margin-bottom: 40px;
      }

      #splash-spinner .ring-outer {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: oklch(0.68 0.32 340);
        border-right-color: oklch(0.85 0.22 200);
        box-shadow:
          0 0 12px oklch(0.68 0.32 340 / 0.7),
          0 0 30px oklch(0.85 0.22 200 / 0.4),
          inset 0 0 8px oklch(0.68 0.32 340 / 0.5);
        animation: splash-spin 1s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      }

      #splash-spinner .ring-inner {
        position: absolute;
        inset: 8px;
        border-radius: 50%;
        border: 1px solid transparent;
        border-bottom-color: oklch(0.85 0.22 200);
        border-left-color: oklch(0.68 0.32 340);
        opacity: 0.7;
        animation: splash-spin-reverse 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      }

      #splash-spinner .dot {
        position: absolute;
        inset: 22px;
        border-radius: 50%;
        background: oklch(0.68 0.32 340);
        box-shadow: 0 0 10px oklch(0.68 0.32 340);
        animation: splash-pulse 1.5s ease-in-out infinite;
      }

      /* Lines */
      #splash-lines {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.2em;
        color: oklch(0.85 0.22 200);
        text-shadow: 0 0 6px oklch(0.85 0.22 200 / 0.6);
      }

      #splash-lines span {
        opacity: 0;
        animation: splash-fade-in 0.3s ease-out forwards;
      }

      /* Keyframes */
      @keyframes splash-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes splash-spin-reverse {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }

      @keyframes splash-pulse {
        0%, 100% { opacity: 0.4; transform: scale(0.7); }
        50% { opacity: 1; transform: scale(1); }
      }

      @keyframes splash-fade-in {
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Pre-hydration splash: hidden by React on mount -->
      <div id="splash">
        <div id="splash-spinner">
          <div class="ring-outer"></div>
          <div class="ring-inner"></div>
          <div class="dot"></div>
        </div>
        <div id="splash-lines">
          <span style="animation-delay: 0s">> BOOT_SEQUENCE INITIALIZED</span>
          <span style="animation-delay: 0.3s">> MEMORY CHECK: OK</span>
          <span style="animation-delay: 0.6s">> SENSOR CALIBRATION IN PROGRESS...</span>
          <span style="animation-delay: 0.9s">> NEON INTERFACE: ONLINE</span>
          <span style="animation-delay: 1.2s">> ESTABLISHING SECURE LINK...</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
